# ── FibroScan thresholds (LSM in kPa) — Metavir staging for NASH/NAFLD ──────
# Reference: EASL-ALEH Clinical Practice Guidelines (2015); M2-BF probe values
#
# Stage  Histology                          LSM range (kPa)
# ─────  ─────────────────────────────────  ───────────────
# F0     No fibrosis                        < 5.5
# F1     Portal fibrosis, no septa          5.5 – 7.0
# F2     Portal fibrosis with few septa     7.1 – 9.4   ← inclusion minimum
# F3     Bridging fibrosis                  9.5 – 12.4
# F4     Cirrhosis                          ≥ 12.5       ← flag for review
fibroscan:
  f0_max: 5.4                        # F0: no fibrosis
  f1_min: 5.5
  f1_max: 7.0                        # F1: portal fibrosis, no septa
  f2_min: 7.1                        # inclusion criterion minimum (≥ F2)
  f2_max: 9.4
  f3_min: 9.5
  f3_max: 12.4
  f4_min: 12.5                       # F4 = cirrhosis (Metavir)
  cirrhosis_kpa: 12.5                # flag for safety review (≥ F4)
  cap_steatosis_threshold: 248       # dB/m — S1 steatosis onset

# ── Urinalysis alert thresholds ─────────────────────────────
urinalysis:
  protein_alert: "2+"               # flag ≥ 2+ protein
  glucose_alert: "1+"               # flag any glucose
  blood_alert: "1+"

# ── Consent timing rules ────────────────────────────────────
consent:
  max_days_before_screening: 0       # consent must be on or before screening
  rescreen_requires_new_icf: true
  current_icf_version: "v3.0"       # flag subjects on older versions
