# ============================================================
# Protocol Compliance Rules — Liver Fibrosis Trial
# Update these values to match the approved protocol version.
# ============================================================

protocol:
  title: "Karyon Bio Liver Fibrosis Study"
  version: "1.0"
  phase: "II"

# ── Subject eligibility ─────────────────────────────────────
eligibility:
  inclusion:
    age_min: 18
    age_max: 75
    fibroscan_min_kpa: 7.1           # ≥ F2 stage
    alt_uln_multiplier: 1.5          # ALT must be ≥ 1.5× ULN at screening
    bmi_min: 18.0
    bmi_max: 40.0

  exclusion:
    fibroscan_cirrhosis_kpa: 12.5    # F4 decompensated — flag for review
    active_hbv: true                 # HBsAg positive
    active_hcv: true                 # HCV RNA detectable
    pregnancy: true
    creatinine_max_mgdl: 1.5        # eGFR proxy

# ── Visit schedule & windows (days relative to Day 1) ───────
visits:
  - name: "Screening"
    target_day: -14
    window_early: -14
    window_late: -1

  - name: "Baseline"
    target_day: 1
    window_early: 0
    window_late: 0                   # exact

  - name: "Week4"
    target_day: 28
    window_early: -3
    window_late: 3

  - name: "Week12"
    target_day: 84
    window_early: -7
    window_late: 7

  - name: "Week24"
    target_day: 168
    window_early: -7
    window_late: 7

  - name: "Week36"
    target_day: 252
    window_early: -7
    window_late: 7

  - name: "EOT"                      # End of Treatment
    target_day: 336
    window_early: -14
    window_late: 14

  - name: "EOS"                      # End of Study / Follow-up
    target_day: 392
    window_early: -14
    window_late: 14

# ── Lab reference ranges (adults, SI-adjacent) ──────────────
# Format: [low, high, unit]
# ULN = upper limit of normal for alert generation
lab_ranges:
